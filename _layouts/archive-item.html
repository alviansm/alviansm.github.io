---
layout: default
---

<article class="post">

  <!-- =========================
       Archive Item Header
       ========================= -->

  <h1>{{ page.title }}</h1>

  <p>
    <small>
      {{ page.date | date: "%Y-%m-%d" }}
    </small>
  </p>

  {% if page.description %}
    <p><strong>{{ page.description }}</strong></p>
  {% endif %}

  <!-- =========================
       Content
       ========================= -->

  <div class="post-content">
    {{ content }}
  </div>

  <!-- =========================
       Tags
       ========================= -->

  {% if page.tags %}
    <div class="section">
      <h2>Tags</h2>
      <p class="tags">
        {% for tag in page.tags %}
          <a href="{{ "/tags.html#" | append: tag | relative_url }}">{{ tag }}</a>
        {% endfor %}
      </p>
    </div>
  {% endif %}

  <!-- =========================
       Back link
       ========================= -->

  <p><a href="{{ "/archive/" | relative_url }}">← Back to Archive</a></p>

</article>
